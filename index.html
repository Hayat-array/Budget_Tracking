<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="container max-w-4xl mx-auto w-full">
      <div class="flex flex-col items-center">
        <div class="w-full">
          <div style="justify-content:center; gap:5rem; margin-bottom:5px ;" class="flex flex-wrap -mx-2 mt-5">
            <!-- Budget Section -->
            <div class="w-full md:w-1/2 lg:w-5/12 px-2 mb-5">
              <div class="box box1 bg-white p-6 rounded-lg shadow-lg">
                <h4 class="font-bold text-xl mb-4 text-gray-800">Budget</h4>
                <div class="input-group flex items-center border border-gray-300 rounded-lg overflow-hidden mb-3">
                  <input type="number" id="total-amount" class="form-input flex-1 p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-l-lg" placeholder="Enter Your Budget">
                </div>
                <p id="error-budget" class="text-red-500 hidden text-sm mt-1">Please enter a valid amount</p>
                <div>
                  <button id="total-amount-button" type="button" class="btn bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-300">Set Budget</button>
                </div>
              </div>
            </div>

            <!-- Spacer for md breakpoint -->
            <div class="hidden md:block md:w-1/12 lg:w-1/12 px-2"></div>

            <!-- Expense Section -->
            <div class="w-full md:w-1/2 lg:w-5/12 px-2 mb-5">
              <div class="box bg-white p-6 rounded-lg shadow-lg">
                <h4 class="font-bold text-xl mb-4 text-gray-800">Expenses</h4>
                <div class="input-group flex items-center border border-gray-300 rounded-lg overflow-hidden mb-3">
                  <input id="product-title" class="form-input flex-1 p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-lg" type="text" placeholder="Travel, Food, etc.">
                </div>
                <div class="input-group flex items-center border border-gray-300 rounded-lg overflow-hidden mb-3">
                  <input id="user-amount" class="form-input flex-1 p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-lg" type="number" placeholder="Enter Cost of Product">
                </div>
                <p id="product-title-error" class="text-red-500 hidden text-sm mt-1">Please enter product and amount</p>
                <div>
                  <button id="check-amount" type="button" class="btn bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-300">Check Amount</button>
                </div>
              </div>
            </div>
            </div>
            <!-- Summary Display -->
            <div class="w-full px-2 mb-5">
              <div class="flex flex-wrap bg-blue-600 text-white font-bold box p-6 rounded-lg shadow-lg text-center">
                <div class="w-full md:w-1/3 mb-4 md:mb-0">
                  <p class="text-sm">Total Budget:</p>
                  <div class="text-2xl mt-1" id="user-amount-display"><span id="user-amount-text">0</span></div>
                </div>
                <div class="w-full md:w-1/3 mb-4 md:mb-0">
                  <p class="text-sm">Expenses:</p>
                  <div class="text-2xl mt-1" id="expenditure-value">0</div>
                </div>
                <div class="w-full md:w-1/3">
                  <p class="text-sm">Balance:</p>
                  <div class="text-2xl mt-1" id="balance-amount">0</div>
                </div>
                <div class="w-full mt-3">
                  <p id="budget-tip-display" class="text-lg font-normal text-white text-left"></p>
                  <p id="loading-tip" class="text-lg font-normal text-white hidden">Generating tip...</p>
                  <p id="spending-analysis-display" class="text-lg font-normal text-white text-left mt-3"></p>
                  <p id="loading-analysis" class="text-lg font-normal text-white hidden">Analyzing spending...</p>
                </div>
              </div>
            </div>

            <!-- Expenses List -->
            <div class="w-full px-2">
              <div class="box bg-white p-6 rounded-lg shadow-lg">
                <p class="text-xl font-bold mb-4 text-gray-800">Expenses List</p>
                <div id="list">
                  <!-- JavaScript will append dynamic expense items here -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
